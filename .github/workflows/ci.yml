name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/app/

  unit:
    if: github.ref != 'refs/heads/imember-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend with cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: i-member-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: cp .env.ci .env
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - run: docker compose up -d redis qdrant scrm
      - run: docker compose run --rm backend python -m pytest tests/unit/ -v
      - run: docker compose down

  pr-agent:
    if: github.event_name == 'pull_request' && github.base_ref != 'imember-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Build backend with cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: i-member-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: |
          cp .env.ci .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
      - name: Select agent tests by diff
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed.txt
          while IFS= read -r f; do
            case "$f" in
              app/agents/router_agent.py)        echo "tests/eval/agent/test_agent_router.py" ;;
              app/agents/ticket/guard_agent.py)   echo "tests/eval/agent/test_agent_guard.py" ;;
              app/agents/ticket/plan_agent.py)    echo "tests/eval/agent/test_agent_plan.py" ;;
              app/workflow/nodes/ticket/executor.py|app/agents/ticket/execute_agent.py)
                                                   echo "tests/eval/agent/test_agent_executor.py" ;;
              app/agents/qa_agent.py|app/workflow/nodes/qa/*)
                                                   echo "tests/eval/agent/test_agent_qa.py" ;;
              app/agents/recommend_guard_agent.py)  echo "tests/eval/agent/test_agent_recommend_guard.py" ;;
              app/agents/recommend_agent.py)        echo "tests/eval/agent/test_agent_recommend.py" ;;
              app/agents/summary_agent.py|app/agents/user_facts_agent.py|app/memory/*)
                                                   echo "tests/eval/agent/test_post_process.py" ;;
              app/prompts/ticket/*|app/prompts/prompt_prefix.txt)
                                                   echo "tests/eval/agent/test_agent_guard.py tests/eval/agent/test_agent_plan.py tests/eval/agent/test_agent_executor.py" ;;
              app/prompts/qa/*)                     echo "tests/eval/agent/test_agent_qa.py" ;;
              app/prompts/recommend/*)              echo "tests/eval/agent/test_agent_recommend_guard.py tests/eval/agent/test_agent_recommend.py" ;;
              app/prompts/router/*)                 echo "tests/eval/agent/test_agent_router.py" ;;
              app/prompts/summary/*|app/prompts/post_process/*)
                                                   echo "tests/eval/agent/test_post_process.py" ;;
            esac
          done < changed.txt | sort -u > selected.txt
          if [ -s selected.txt ]; then
            docker compose up -d redis qdrant scrm
            sleep 5
            docker compose run --rm backend python -m pytest $(tr '\n' ' ' < selected.txt) -v
            docker compose down
          else
            echo "No matching agent tests"
          fi

  pr-e2e:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "No E2E cases in regression yet"
