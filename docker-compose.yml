services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - imember-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: i-member-qdrant-1
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - imember-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APT_MIRROR=${APT_MIRROR}
        - PIP_INDEX_URL=${PIP_INDEX_URL}
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - TZ=Asia/Shanghai
      - REDIS_URL=${REDIS_URL}
      - SCRM_URL=${SCRM_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
      - ./data:/app/data:ro
      - ./data/rag_docs:/app/data/rag_docs
    depends_on:
      redis:
        condition: service_healthy
      scrm:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - imember-network

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APT_MIRROR=${APT_MIRROR}
        - PIP_INDEX_URL=${PIP_INDEX_URL}
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - TZ=Asia/Shanghai
      - REDIS_URL=${REDIS_URL}
      - SCRM_URL=${SCRM_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      redis:
        condition: service_healthy
      scrm:
        condition: service_started
    networks:
      - imember-network
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app" ]
    profiles:
      - dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - PORT=3000
    volumes:
      - ./frontend/index.html:/app/index.html
      - ./frontend/script.js:/app/script.js
      - ./frontend/style.css:/app/style.css
      - ./frontend/server.js:/app/server.js
      - ./frontend/assets:/app/assets
    networks:
      - imember-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  scrm:
    image: mock-scrm:latest
    container_name: mock-scrm
    build:
      context: ./mock_scrm
      dockerfile: Dockerfile
    ports:
      - "${SCRM_PORT:-3658}:3658"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - scrm_data:/app/data
    networks:
      - imember-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/3658'" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  scrm_data:
  qdrant_data:

networks:
  imember-network:
    driver: bridge
