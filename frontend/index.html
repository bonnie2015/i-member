<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌伙伴 · 智能客服</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-avatar">B</div>
                <div class="brand-info">
                    <span class="brand-name">品牌伙伴</span>
                    <span class="brand-tag">会员专属服务</span>
                </div>
            </div>

            <div class="member-card" id="memberCard">
                <div class="member-level" id="memberLevel">加载中...</div>
                <div class="member-points" id="memberPoints"></div>
                <div class="member-name" id="memberName"></div>
            </div>

            <nav class="quick-actions">
                <p class="nav-label">快捷服务</p>
                <button class="quick-btn" data-msg="我想退货">退换货申请</button>
                <button class="quick-btn" data-msg="帮我升级会员">会员升级</button>
                <button class="quick-btn" data-msg="我要申请折扣权益">权益申请</button>
                <button class="quick-btn" data-msg="我要投诉">提交投诉</button>
                <button class="quick-btn" data-msg="积分怎么兑换？">积分规则</button>
            </nav>

            <div class="status-indicator">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </aside>

        <!-- 主聊天区 -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="chat-title">
                    <span class="chat-title-name">智能客服助手</span>
                    <span class="chat-title-sub" id="threadLabel"></span>
                </div>
                <button class="new-chat-btn" id="newChatBtn" title="新对话">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    新对话
                </button>
            </header>

            <div class="messages" id="messages">
                <div class="welcome-msg">
                    <div class="welcome-avatar">B</div>
                    <div class="welcome-text">
                        <p>您好！我是您的专属品牌伙伴 👋</p>
                        <p>有什么我可以帮您的吗？退换货、权益升级、商品咨询都可以找我～</p>
                    </div>
                </div>
            </div>

            <!-- 交互区：追问 / 确认 / 选择 / 普通输入 -->
            <div class="interaction-area" id="interactionArea">
                <!-- 选择面板（select） -->
                <div class="action-panel select-panel hidden" id="selectPanel">
                    <div class="action-panel-label" id="selectLabel"></div>
                    <div class="option-cards" id="optionCards"></div>
                </div>

                <!-- 普通输入 -->
                <div class="input-panel" id="inputPanel">
                    <div class="input-row">
                        <textarea id="messageInput" rows="1" placeholder="请输入您的问题..." maxlength="500"></textarea>
                        <button id="sendBtn" class="send-btn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <span id="charCount">0 / 500</span>
                        <span class="hint" id="inputHint"></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
